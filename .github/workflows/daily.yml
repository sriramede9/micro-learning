name: Daily Architect Scroll

on:
  schedule:
    - cron: '0 2 * * *' # 9 PM EST (Toronto) is 2 AM UTC
  workflow_dispatch: 

permissions:
  contents: write   
  pages: write      
  id-token: write   

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      # Explicitly opt-in to the Node 24 runtime for all actions
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6 # Latest: Node 24 support

      - name: Set up Python
        uses: actions/setup-python@v6 # Latest: Node 24 support
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests markdown

      - name: Run Architect Script
        run: python send_intel.py

      - name: Commit & Push Progress
        run: |
          git config --global user.name "Architect-Bot"
          git config --global user.email "bot@github.com"
          git add progress.json docs/index.md
          git commit -m "🚀 Day Update [skip ci]" || echo "No changes to commit"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5 # Verified for Node 24

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v4 # Standard for Pages
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # Latest stable deploy action
