name: Daily Architect Scroll
on:
  schedule:
    - cron: '0 2 * * *' # 9 PM EST (Toronto) is 2 AM UTC
  workflow_dispatch: # Allows you to run it manually to test

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial: Allows the bot to update your feed
    steps:
      - uses: actions/checkout@v4
      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python send_intel.py
      - name: Commit & Push
        run: |
          git config --global user.name "Architect-Bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "Day ${{ github.run_number }} Update" || echo "No changes"
          git push
