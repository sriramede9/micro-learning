name: Daily Architect Scroll
on:
  schedule:
    - cron: '0 2 * * *' # 9 PM EST (Toronto) is 2 AM UTC
  workflow_dispatch: # Allows you to run it manually to test

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial: Allows the bot to update your feed
    steps:
      - uses: actions/checkout@v4
      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python send_intel.py

      - name: Commit Progress
        run: |
          git config --global user.name "Architect-Bot"
          git config --global user.email "bot@github.com"
          git add progress.json docs/index.md
          git commit -m "Day Update" || echo "No changes"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs' # This points to your scrollable feed folder

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
