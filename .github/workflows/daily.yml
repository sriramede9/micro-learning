name: Daily Architect Scroll

on:
  schedule:
    - cron: '0 2 * * *' # 9 PM EST (Toronto) is 2 AM UTC
  workflow_dispatch: # Allows you to manually trigger the "First Run"

permissions:
  contents: write   
  pages: write      
  id-token: write   

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6 # Node 24 Support

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Architect Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python send_intel.py

      - name: Commit & Push Progress
        run: |
          git config --global user.name "Architect-Bot"
          git config --global user.email "bot@github.com"
          git add progress.json docs/index.md
          git commit -m "🚀 Day Update [skip ci]" || echo "No changes to commit"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5 # Node 24 Support

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
