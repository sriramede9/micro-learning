name: 🏠 Property Intelligence Terminal
on:
  schedule:
    - cron: '0 1 * * *' # 8 PM EST
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests markdown

      - name: 🔥 RUN ALL ENGINES
        run: python run_all.py  # This triggers the manager you wrote!

      - name: Commit & Push All Reports
        run: |
          git config --global user.name "Asset-Bot"
          git config --global user.email "bot@github.com"
          git add reports/ docs/ progress.json
          git commit -m "🏠 Full Property Intelligence Update [skip ci]" || echo "No changes"
          git push

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
